<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBE MicTech — Outcome Based Education Management</title>
    <meta name="description" content="OBE MicTech College Management System — Faculty, Coordinator, Management & HOD portal for outcome-based education.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ==================== LOGIN PAGE ==================== -->
    <div id="login-page">
        <div class="login-hero">
            <div class="login-container">
                <div class="college-header">
                    <h1 class="college-name">OBE <span>MicTech</span></h1>
                    <p class="college-tagline">Outcome Based Education Management System</p>
                </div>

                <div class="hero-content">
                    <p class="hero-subtitle">Streamline academic workflows, track subject progress, and manage outcome-based evaluation with precision.</p>
                    <div class="hero-actions">
                        <button class="btn-glow" id="btn-portal-login">Access Portal <span class="arrow">→</span></button>
                    </div>
                </div>

                <p class="login-footer">
                    &copy; 2026 OBE MicTech &mdash; All rights reserved
                </p>
            </div>
        </div>

        <!-- Login Modal -->
        <div id="login-modal" class="modal">
            <div class="modal-overlay" id="login-modal-overlay"></div>
            <div class="modal-content" id="login-modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Login</h2>
                    <button class="modal-close" id="login-modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="login-form">
                        <div class="form-group">
                            <label class="form-label" for="login-role">Select Role</label>
                            <select class="form-select" id="login-role" required>
                                <option value="" disabled selected>— Select your role —</option>
                                <option value="faculty">Faculty</option>
                                <option value="coordinator">Coordinator</option>
                                <option value="management">Management</option>
                                <option value="hod">HOD</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="login-username">Username</label>
                            <input type="text" class="form-input" id="login-username" placeholder="Enter your username" required autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="login-password">Password</label>
                            <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                        </div>
                        <div id="login-error" class="error-message" style="display:none"></div>
                        <button type="submit" class="btn btn-primary btn-block" id="login-submit">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== DASHBOARD ==================== -->
    <div id="dashboard-page" style="display:none">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main-content" class="main-content"></main>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/marks_utils.js"></script>
    <script src="js/faculty.js"></script>
    <script src="js/coordinator.js"></script>
    <script src="js/management.js"></script>
    <script src="js/hod.js"></script>
</body>
</html>
